# Starter Hen manifest. Create it with:
#   coop hen create examples/aria.yaml
#
# `provider_id` points at a secret stored in your sealed BYOK vault
# (see docs/quickstart.md). Swap the model for whatever you have access to.
#
# To pull the key from Azure Key Vault instead of the local vault, use:
#   provider_id: azure-kv://<your-vault-name>/byok-anthropic
# and set AZURE_TENANT_ID / AZURE_CLIENT_ID / AZURE_CLIENT_SECRET (or
# AZURE_KEYVAULT_TOKEN). See docs/configuration.md → BYOK secret backends.
spec_version: coop/v1
name: aria
brain:
  provider_id: vault:byok-anthropic
  model: claude-sonnet-4-5-20250929
tools: [bash, file_read, file_write, http]

# Per-hen network egress policy (optional; omit for unrestricted `open`).
#   off       — no egress at all.
#   allowlist — egress only to the hosts/ports below (default-deny).
#   open      — unrestricted (the http tool still blocks SSRF).
# Under `allowlist`, the `http` tool reaches allowed hosts; the `bash`/tmux
# shell gets NO direct network (Linux empty netns / macOS Seatbelt deny).
# See docs/net-isolation.md.
network:
  policy: allowlist
  allow:
    - host: api.anthropic.com
      ports: [443]

# Persistent episodic memory (optional). When set, Coop records one compact
# episode per completed job and replays the most recent ones into the hen's
# system prompt next time — so the hen continues from context instead of
# starting from zero. See docs/memory.md.
memory:
  # Drop episodes older than this many days (omit / 0 = keep indefinitely).
  episodic_retention_days: 30
  # Inherit another hen's memory at creation time, e.g. to fork a trained hen:
  #   inherit_from: local.coop/aria
